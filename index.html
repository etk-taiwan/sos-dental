<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="植牙失敗、發炎、掉落？專業醫師救援，立即免費評估">
    <link rel="icon" href="data:image/svg+xml,
        <svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
        <text y=%22.9em%22 font-size=%2290%22>🦷</text>
        </svg>">
    <title>植牙失敗救援｜SOS Dental</title>

    </style>
    <base id="baseHref">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/main.js"></script>
    <script defer src="js/bgCanvas.js"></script>
</head>

<body>

    <div id="header"></div>
    <section class="pt-5">
        <img class="img-rwd" src="./images/index-implant.jpg" alt="植牙救援">
    </section>

    <!-- 背景層 -->
    <section class="hero">
        <div class="hero-bg">
            <canvas id="bgCanvas"></canvas>
        </div>

        <!-- 內容層 -->
        <div class="hero-content">
            <h1>植牙失敗 即刻救援</h1>
            <p>你不是第一個，我們也不是第一次</p>

            <a href="./assessment/" class="btn btn-red">🚨 免費評估</a>
            <a class="btn btn-green">📲 LINE 諮詢</a>
        </div>
    </section>

    <section class="contents">
        <!-- 信任 -->
        <div class="text-gold text-center d-flex-center flex-rwd">
            <div>✔ 已成功救援 300+ 案例</div>
            <div>✔ 專業醫師評估</div>
            <div>✔ 當日判斷</div>
        </div>

        <!-- 解決流程 -->
        <section class="container">
            <h2 class="pt-4">救援流程</h2>
            <div class="card bg-white">
                <img class="img-rwd" src="./images/sos-dental.png" alt="植牙救援流程">
            </div>
        </section>

        <!-- 失敗類型 -->
        <section class="container">
            <h2 class="pt-4">常見失敗類型</h2>
            <div class="grid">
                <div class="card bg-white for-mobile"><img class="img-rwd" src="./images/Failure.png" alt="植牙失敗"></div>
                <div class="card bg-white for-pc"><img class="img-rwd" src="./images/Failure-pc.png" alt="植牙失敗"></div>
            </div>
        </section>

        <section class="cta pt-4">
            <div class="risk">⚠️ 延誤可能導致骨流失</div>
            <h3>你也有類似問題嗎？</h3>
            <a href="./assessment/" class="btn btn-red">立即評估</a>
        </section>

    </section>
    <!-- 浮動CTA -->
    <div id="floating-cta"></div>

</body>

</html>
