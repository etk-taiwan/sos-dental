<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="植牙失敗、發炎、掉落？專業醫師救援，立即免費評估">
    <link rel="icon" href="data:image/svg+xml,
        <svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
        <text y=%22.9em%22 font-size=%2290%22>🦷</text>
        </svg>">
    <title>植牙失敗救援｜SOS Dental</title>

    </style>
    <base id="baseHref">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/main.js"></script>
    <script defer src="js/bgCanvas.js"></script>
    <style>
        /* ===== 影片區塊 ===== */
        .hero-video {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        .video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: translate(-50%, -45%);
        }

        /* 文字層 */
        .video-overlay {
            position: absolute;
            top: 30%;
            left: 30%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            width: 90%;
            line-height: 1.2;
        }

        .video-overlay2 {
            position: absolute;
            bottom: 1%;
            left: 70%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            width: 90%;
            line-height: 1.5;
        }

        .hero-video::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            /* 微暗遮罩 */
            top: 0;
            left: 0;
        }

        /* 金色漸層文字 */
        .video-overlay .t1,
        .video-overlay .t2,
        .video-overlay .t3,
        .video-overlay .t4,
        .video-overlay2 {
            font-weight: bold;
            background: linear-gradient(90deg, #FFD700, #FFF3B0, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.6)) drop-shadow(0 6px 16px rgba(0, 0, 0, 0.5));
        }

        .t1 {
            font-size: 2.5rem;
        }

        .t2 {
            font-size: 2rem;
        }

        .t3 {
            font-size: 1.5rem;
        }

        .t4 {
            font-size: 1rem;
        }

        .hr-glod {
            width: 400px;
            height: 1px;
            display: block;
            margin: 4px auto;
        }

        /* 🔥 不用 flex，改 inline 排列 */
        .check-line {
            display: inline-block;
        }

        /* 方塊 */
        .check-icon {
            display: inline-block;
            width: 24px;
            height: 24px;
            margin-right: 6px;
            vertical-align: middle;

            border: 2px solid #FFD700;
            border-radius: 3px;
            position: relative;
        }

        .check-icon::after {
            content: "✔";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
            font-size: 16px;
            color: #FFD700;
            -webkit-text-fill-color: initial;
        }

        /* 手機版 */
        @media (max-width: 992px) {
            .hero-video {
                position: relative;
                width: 100%;
                height: 95vh;
                overflow: hidden;
                background: #000;
            }

            .video-overlay {
                position: absolute;
                top: 25%;
                left: 30%;
                transform: translate(-50%, -50%);
                text-align: center;
                z-index: 2;
                width: 90%;
                line-height: 1.2;
            }

            .video-overlay2 {
                position: absolute;
                bottom: 1%;
                left: 45%;
                transform: translate(-50%, -50%);
                text-align: center;
                z-index: 2;
                width: 90%;
                line-height: 1.5;
            }

            .t1 {
                font-size: 2rem;
            }

            .t2 {
                font-size: 1.5rem;
            }

            .t3 {
                font-size: 1rem;
            }

            .t4 {
                font-size: 0.75rem;
            }

            .hr-glod {
                width: 300px;
                height: 1px;
                display: block;
                margin: 4px auto;
            }

            /* 方塊 */
            .check-icon {
                display: inline-block;
                width: 22px;
                height: 22px;
                margin-right: 6px;
                vertical-align: middle;

                border: 2px solid #FFD700;
                border-radius: 3px;
                position: relative;
            }

            .check-icon::after {
                content: "✔";
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -55%);
                font-size: 12px;
                color: #FFD700;
                -webkit-text-fill-color: initial;
            }

        }

        @media (max-width:390px) {
            .video-overlay {
                top: 22%;
                left: 40%;
            }
        }
    </style>
</head>

<body>

    <div id="header"></div>

    <section class="hero-video">
        <video class="video-bg" autoplay muted loop playsinline>
            <source src="./images/dental_implant.mp4" type="video/mp4">
        </video>

        <div class="video-overlay">
            <div class="t1">植牙失敗，<span class="t2">不是終點</span></div>
            <div class="t2">這裡，是<span class="t1">重生</span>的開始</div>
            <img class="hr-glod" src="./images/hr-glod.png">
            <div class="t4">IMPLANT CRISIS RESCUE TEAM</div>
            <img class="hr-glod" src="./images/hr-glod.png">
            <div class="t3">〘 最後一站 • 最後希望 〙</div>
        </div>
        <div class="video-overlay2">
            <div class="t3 check-line">
                <span class="check-icon"></span>
                植牙孤兒,不再流浪
            </div>
            <img class="hr-glod" src="./images/hr-glod.png">
            <div class="t3">&emsp;&emsp;&emsp;&emsp;&emsp;我們專收「別人不敢做的」</div>
        </div>
    </section>

    <!-- 背景層 -->
    <section class="hero">
        <div class="hero-bg">
            <canvas id="bgCanvas"></canvas>
        </div>

        <!-- 內容層 -->
        <div class="hero-content">
            <h1>植牙失敗 即刻救援</h1>
            <p>你不是第一個，我們也不是第一次</p>

            <a href="./assessment/" class="btn btn-red">🚨 免費評估</a>
            <a class="btn btn-green">📲 LINE 諮詢</a>
        </div>
    </section>

    <section class="contents">
        <!-- 信任 -->
        <div class="text-gold text-center d-flex-center flex-rwd">
            <div>✔ 已成功救援 300+ 案例</div>
            <div>✔ 專業醫師評估</div>
            <div>✔ 當日判斷</div>
        </div>

        <!-- 解決流程 -->
        <section class="container">
            <h2 class="pt-4">救援流程</h2>
            <div class="card bg-white">
                <img class="img-rwd" src="./images/sos-dental.png" alt="植牙救援流程">
            </div>
        </section>

        <!-- 失敗類型 -->
        <section class="container">
            <h2 class="pt-4">常見失敗類型</h2>
            <div class="grid">
                <div class="card bg-white for-mobile"><img class="img-rwd" src="./images/Failure.png" alt="植牙失敗"></div>
                <div class="card bg-white for-pc"><img class="img-rwd" src="./images/Failure-pc.png" alt="植牙失敗"></div>
            </div>
        </section>

        <section class="cta pt-4">
            <div class="risk">⚠️ 延誤可能導致骨流失</div>
            <h3>你也有類似問題嗎？</h3>
            <a href="./assessment/" class="btn btn-red">立即評估</a>
        </section>

    </section>
    <!-- 浮動CTA -->
    <div id="floating-cta"></div>

</body>

</html>
