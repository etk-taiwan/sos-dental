<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="植牙失敗、發炎、掉落？專業醫師救援，立即免費評估">
  <link rel="icon" href="data:image/svg+xml,
        <svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
        <text y=%22.9em%22 font-size=%2290%22>🦷</text>
        </svg>">
  <title>聯絡我們 | SOS.dental</title>
  <base id="baseHref">
  <link rel="stylesheet" href="../css/style.css">
  <script defer src="../js/main.js"></script>

  <style>
    /* ===== HERO ===== */
    .hero-contact {
      padding: 120px 20px;
      text-align: center;

      background:
        linear-gradient(rgba(12, 30, 51, .75), rgba(12, 30, 51, .85)),
        url('../images/hero-bg-us.png') center/cover;
    }

    /* ===== 聯絡卡 ===== */
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      margin-top: 40px;
    }

    .contact-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(195, 167, 104, 0.2);
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      transition: 0.3s;
    }

    .contact-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    /* 地圖 */
    .map {
      margin-top: 60px;
    }

    .map iframe {
      width: 100%;
      height: 400px;
      border-radius: 12px;
      border: none;
    }
  </style>

</head>

<body>

  <div id="header"></div>

  <!-- HERO -->
  <section class="hero-contact">
    <h1>聯絡我們</h1>
    <p>立即諮詢，讓專業團隊為你評估</p>

    <a href="./assessment/" class="btn btn-red">免費評估</a>
    <a href="https://line.me/ti/p/~ewinwin515" class="btn btn-green">LINE 諮詢</a>
  </section>

  <!-- 聯絡資訊 -->
  <section class="contents">

    <div class="contact-grid">

      <!-- 電話 -->
      <div class="contact-card">
        <h3>📞 電話</h3>
        <p>04 23261 777</p>
        <a href="tel:0423261777" class="btn btn-gold">立即撥打</a>
      </div>

      <!-- LINE -->
      <div class="contact-card">
        <h3>💬 LINE</h3>
        <p>ID：edwin515</p>
        <a href="https://line.me/ti/p/~ewinwin515" target="_blank" class="btn btn-green">
          加入LINE
        </a>
      </div>

    </div>

    <!-- Google Map -->
    <div class="map">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3640.531820399992!2d120.6615568!3d24.153074699999998!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x34693d9c6b93aa0d%3A0x8a3d830c81e3a2d5!2z5pyx6KOV6I-v54mZ6Yar6Ki65omA!5e0!3m2!1szh-TW!2stw!4v1776161866852!5m2!1szh-TW!2stw"
        width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>

    <!-- CTA -->
    <div class="cta">
      <h2>不確定是否適合？</h2>
      <a href="./assessment/" class="btn btn-red">免費評估</a>
    </div>

  </section>

  <!-- 浮動CTA -->
  <div id="floating-cta"></div>

</body>

</html>
