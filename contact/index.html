<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聯絡我們 | SOS.dental</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">

<style>

/* HERO */
.hero-contact {
  position:relative;
  padding:120px 20px;
  text-align:center;
  color:#fff;

  background:
    linear-gradient(rgba(12,30,51,.85), rgba(12,30,51,.95)),
    url('https://images.unsplash.com/photo-1588776814546-ec7e6b0d7b03?q=80&w=1920') center/cover;
}

.hero-contact::before {
  content:"";
  position:absolute;
  top:-100px;
  left:50%;
  transform:translateX(-50%);
  width:800px;
  height:400px;
  background: radial-gradient(circle, rgba(195,167,104,0.25), transparent 70%);
}

/* 聯絡卡 */
.contact-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}

.contact-card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(195,167,104,0.2);
  padding:30px;
  border-radius:12px;
  text-align:center;
  transition:0.3s;
}

.contact-card:hover {
  transform:translateY(-5px);
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.contact-card h3 {
  margin-bottom:10px;
}

/* 地圖 */
.map {
  margin-top:60px;
}

.map iframe {
  width:100%;
  height:400px;
  border-radius:12px;
  border:none;
}

/* CTA */
.cta {
  text-align:center;
  margin-top:40px;
}

</style>
</head>

<body>

<!-- Header -->
<header>
<nav>
<div>🦷 SOS.dental</div>
<div>
<a href="/">首頁</a>
<a href="/rescue/">救援</a>
<a href="/cases/">案例</a>
<a href="/assessment/">評估</a>
</div>
</nav>
</header>

<!-- HERO -->
<section class="hero-contact">
  <h1>聯絡我們</h1>
  <p>立即諮詢，讓專業團隊為你評估</p>
</section>

<!-- 聯絡方式 -->
<section class="container">

<div class="contact-grid">

  <!-- 電話 -->
  <div class="contact-card">
    <h3>📞 電話</h3>
    <p>0900-000-000</p>
    <a href="tel:0900000000" class="btn btn-gold">立即撥打</a>
  </div>

  <!-- LINE -->
  <div class="contact-card">
    <h3>💬 LINE</h3>
    <p>@yourline</p>
    <a href="https://line.me/" target="_blank" class="btn btn-green">加入LINE</a>
  </div>

</div>

<!-- 地圖 -->
<div class="map">
  <iframe 
    src="https://www.google.com/maps?q=Taipei&output=embed">
  </iframe>
</div>

<!-- CTA -->
<div class="cta">
  <a href="/assessment/" class="btn btn-gold">免費評估</a>
</div>

</section>

<div id="header"></div>
</body>
</html>
