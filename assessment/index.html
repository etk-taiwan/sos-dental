<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="植牙失敗、發炎、掉落？專業醫師救援，立即免費評估">
  <link rel="icon" href="data:image/svg+xml,
        <svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
        <text y=%22.9em%22 font-size=%2290%22>🦷</text>
        </svg>">
  <title>免費評估 | SOS.dental</title>
  <base id="baseHref">
  <link rel="stylesheet" href="../css/style.css">
  <script defer src="../js/main.js"></script>

  <style>
    /* ===== HERO ===== */
    .hero-assess {
      padding: 100px 20px;
      text-align: center;

      background:
        linear-gradient(rgba(12, 30, 51, .75), rgba(12, 30, 51, .85)),
        url('../images/hero-bg-ass.png') center/cover;
    }

    /* ===== 進度條 ===== */
    .progress {
      display: flex;
      justify-content: space-between;
      margin: 30px 0;
    }

    .step {
      flex: 1;
      text-align: center;
      position: relative;
    }

    .step::after {
      content: '';
      position: absolute;
      top: 12px;
      right: -50%;
      width: 100%;
      height: 2px;
      background: #444;
    }

    .step:last-child::after {
      display: none;
    }

    .prev {
      margin-right: 10px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .prev-row {
      margin-bottom: 12px;
    }

    .prev-row .prev {
      width: auto;
    }

    .circle {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: #444;
      margin: auto;
    }

    .active .circle {
      background: #C3A768;
    }

    /* ===== 表單 ===== */
    .form-step {
      display: none;
    }

    .form-step .btn {
      margin-right: 10px;
    }

    .form-step.active {
      display: block;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: none;
      background: #1a3554;
      color: #fff;
    }

    /* ===== 圖片預覽 ===== */
    .upload-tip {
      color: #ff4d4f;
      font-size: 13px;
      margin-top: 6px;
    }

    .preview {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .preview-item {
      position: relative;
    }

    .preview img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
    }

    .remove-btn {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #ff4d4f;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="header"></div>

  <!-- HERO -->
  <section class="hero-assess">
    <h1>免費評估</h1>
    <p class="text-gold">90%案例可重建，立即了解你的狀況</p>
  </section>


  <section class="contents">

    <!-- 進度 -->
    <div class="progress">
      <div class="step active">
        <div class="circle"></div>
        <p>Step 1</p>
      </div>
      <div class="step">
        <div class="circle"></div>
        <p>Step 2</p>
      </div>
      <div class="step">
        <div class="circle"></div>
        <p>Step 3</p>
      </div>
    </div>

    <form id="form">

      <!-- Step 1 -->
      <div class="form-step active">
        <input name="name" placeholder="姓名">
        <input type="number" inputmode="numeric" name="age" placeholder="年齡">
        <button type="button" class="btn next">下一步</button>
      </div>

      <!-- Step 2 -->
      <div class="form-step">
        <select name="symptom">
          <option>選擇症狀</option>
          <option>發炎</option>
          <option>掉落</option>
          <option>疼痛</option>
        </select>

        <input type="file" id="upload" multiple>
        <p class="upload-tip">⚠️ 最多上傳 2 個檔案（非必填，建議透過LINE提供更清楚）</p>
        <div class="preview"></div>

        <button type="button" class="btn next">下一步</button>
      </div>

      <!-- Step 3 -->
      <div class="form-step">
        <input name="contact" placeholder="聯絡方式（電話或LINE）">

        <div class="cta">
          <a href="#" id="submitBtn" class="btn btn-red">提交評估</a>
          <a href="https://line.me/R/ti/p/@205rzchp" class="btn btn-green">LINE 諮詢</a>
        </div>
      </div>

    </form>

  </section>
  <!-- 浮動CTA -->
  <div id="floating-cta"></div>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <script>
    // 初始化
    emailjs.init("_-Y2LMERWucebZccJ");

    /* ===== Step 控制 ===== */
    let currentStep = 0;

    const steps = document.querySelectorAll(".form-step");
    const progressSteps = document.querySelectorAll(".progress .step");
    function getBase64Size(base64) {
      return Math.ceil((base64.length * 3) / 4);
    }
    function showStep(index) {
      steps.forEach((step, i) => {
        step.classList.toggle("active", i === index);
      });

      progressSteps.forEach((step, i) => {
        step.classList.toggle("active", i <= index);
      });
    }

    /* 下一步 */
    document.querySelectorAll(".next").forEach(btn => {
      btn.addEventListener("click", async () => {

        // 👉 如果是 Step2 才檢查
        if (currentStep === 1) {



          let totalSize = compressedArray.reduce(
            (sum, img) => sum + getBase64Size(img), 0
          );

          console.log("總大小:", totalSize);
          if (totalSize > 50000) {
            alert("圖片總大小超過限制，請刪除或更換圖片");
            return;
          }
        }
        // ✅ 正常進下一步
        if (currentStep < steps.length - 1) {
          currentStep++;
          showStep(currentStep);
        }

      });
    });

    /* 上一步 */
    function addPrevButtons() {
      steps.forEach((step, index) => {
        if (index === 0) return;

        const prevBtn = document.createElement("button");
        prevBtn.type = "button";
        prevBtn.className = "btn prev";
        prevBtn.innerText = "上一步";

        prevBtn.addEventListener("click", () => {
          if (currentStep > 0) {
            currentStep--;
            showStep(currentStep);
          }
        });

        const nextBtn = step.querySelector(".next");
        const submitBtn = step.querySelector(".btn-red");

        if (nextBtn) {
          // Step 2
          nextBtn.parentNode.insertBefore(prevBtn, nextBtn);

        } else if (submitBtn) {
          // Step 3（分開一排）

          const wrapper = document.createElement("div");
          wrapper.className = "prev-row";

          wrapper.appendChild(prevBtn);

          step.insertBefore(wrapper, submitBtn.parentNode);
        }
      });
    }

    /* 初始化 */
    const tip = document.querySelector('.upload-tip');
    document.addEventListener("DOMContentLoaded", () => {
      tip.style.display = "block";
      showStep(currentStep);
      addPrevButtons();
    });

    /* ===== 圖片預覽 ===== */
    let filesArray = [];
    let compressedArray = [];

    const input = document.getElementById('upload');
    const preview = document.querySelector('.preview');

    input.addEventListener('change', async function () {

      const newFiles = Array.from(this.files);
      let combined = [...filesArray, ...newFiles];

      if (combined.length > 2) {
        alert("最多只能上傳 2 個檔案");
        combined = combined.slice(0, 2);
      }

      filesArray = combined;

      // 這裡直接壓縮一次
      compressedArray = [];

      for (let file of filesArray) {
        const compressed = await compressImageSmart(file, 12000);
        compressedArray.push(compressed);
      }

      this.value = "";

      renderPreview();
    });

    function renderPreview() {
      preview.innerHTML = '';

      filesArray.forEach((file, index) => {

        const reader = new FileReader();

        reader.onload = e => {
          const wrapper = document.createElement('div');
          wrapper.className = "preview-item";

          wrapper.innerHTML = `
        <img src="${e.target.result}">
        <button type="button" class="remove-btn">✕</button>
      `;

          wrapper.querySelector(".remove-btn").addEventListener("click", () => {
            filesArray.splice(index, 1);
            compressedArray.splice(index, 1);

            input.value = "";
            renderPreview();
          });

          preview.appendChild(wrapper);
        };

        reader.readAsDataURL(file);
      });

      // 🔥 這段加在最後
      if (filesArray.length > 0) {
        tip.style.display = "none";
      } else {
        tip.style.display = "block";
      }
    }
    /* ===== 圖片壓縮 ===== */
    async function compressImageSmart(file, maxSize = 50000) {
      let quality = 0.7;
      let scale = 1;

      let base64 = await compress(file, quality, scale);

      while (getBase64Size(base64) > maxSize && quality > 0.1) {
        quality -= 0.1;

        // iPhone 關鍵：同時縮尺寸
        scale -= 0.1;
        if (scale < 0.3) scale = 0.3;

        base64 = await compress(file, quality, scale);
      }

      return base64;
    }

    function compress(file, quality, scale = 1) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = e => img.src = e.target.result;
        reader.onerror = reject;

        img.onload = () => {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");

          let width = img.width * scale;
          let height = img.height * scale;

          // 強制上限（iPhone 超重要）
          const maxWidth = 800;
          if (width > maxWidth) {
            height *= maxWidth / width;
            width = maxWidth;
          }

          canvas.width = width;
          canvas.height = height;

          ctx.drawImage(img, 0, 0, width, height);

          resolve(canvas.toDataURL("image/jpeg", quality));
        };

        reader.readAsDataURL(file);
      });
    }

    /* ===== 表單送出（EmailJS版本） ===== */
    document.getElementById("submitBtn").addEventListener('click', async (e) => {
      e.preventDefault();

      const form = document.getElementById('form');
      const formData = new FormData(form);

      const name = formData.get('name');
      const age = formData.get('age');
      const symptom = formData.get('symptom');
      const contact = formData.get('contact');

      // 驗證
      // 防機器人
      const botcheck = formData.get('website');
      if (botcheck) return;

      if (!name || !contact) {
        alert("請填寫姓名與聯絡方式");
        return;
      }


      const files = filesArray;
      let images = [];
      let imageHTML = "";

      if (files.length > 2) {
        alert("最多上傳2張圖片");
        return;
      }

      for (let img of compressedArray) {

        if (getBase64Size(img) > 50000) {
          alert("圖片仍過大，請換一張圖片");
          return;
        }

        images.push(img);
        imageHTML += `<img src="${img}" style="max-width:300px;"><br/>`;
      }
      console.log({ name, age, symptom, contact, images });

      // 發送
      emailjs.send(
        "service_ak1hqal",
        "template_t1pqdsi",
        {
          name,
          age,
          symptom,
          contact,
          images: imageHTML
        },
        "_-Y2LMERWucebZccJ"
      )
        .then(() => {
          alert("✅ 已送出，專人將與您聯繫");

          setTimeout(() => {
            window.location.href = "./assessment/success.html";
          }, 1000);
        })
        .catch((err) => {
          console.error("錯誤👇", err);

          // ⭐ 判斷 413（EmailJS 會藏在 err.text 或 err.status）
          if (
            err.status === 413 ||
            (err.text && err.text.includes("413"))
          ) {
            handle413();
            return;
          }

          alert("❌ 發送失敗，請稍後再試");
        });

    });

    // Base64轉換
    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // iPhone 修正 zoom + scroll 卡住
    function scrollToInput(el) {
      setTimeout(() => {
        el.scrollIntoView({
          behavior: 'smooth',
          block: 'center'
        });
      }, 300);

      // iOS 補強
      let count = 0;
      let timer = setInterval(() => {
        el.scrollIntoView({ block: 'center' });
        count++;
        if (count > 3) clearInterval(timer);
      }, 300);
    }

    function handle413() {
      // 👉 回 Step2
      currentStep = 1;
      showStep(1);

      // 👉 提示
      alert("⚠️ 圖片太大，請刪除或更換圖片");

      // ❗❗ 不要清空圖片 ❗❗
      // 保留 filesArray / compressedArray

      // 👉 重新 render（確保畫面還在）
      renderPreview();
    }

    document.querySelectorAll('input, select').forEach(el => {
      el.addEventListener('focus', () => scrollToInput(el));
    });

  </script>

</body>

</html>
