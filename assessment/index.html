<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="植牙失敗、發炎、掉落？專業醫師救援，立即免費評估">
  <title>免費評估 | SOS.dental</title>
  <base id="baseHref">
  <link rel="stylesheet" href="../css/style.css">
  <script defer src="../js/main.js"></script>

  <style>
    /* ===== HERO ===== */
    .hero-assess {
      padding: 100px 20px;
      text-align: center;

      background:
        linear-gradient(rgba(12, 30, 51, .85), rgba(12, 30, 51, .95)),
        url('https://images.unsplash.com/photo-1588776814546-ec7e6b0d7b03?q=80&w=1920') center/cover;
    }

    /* ===== 進度條 ===== */
    .progress {
      display: flex;
      justify-content: space-between;
      margin: 30px 0;
    }

    .step {
      flex: 1;
      text-align: center;
      position: relative;
    }

    .step::after {
      content: '';
      position: absolute;
      top: 12px;
      right: -50%;
      width: 100%;
      height: 2px;
      background: #444;
    }

    .step:last-child::after {
      display: none;
    }

    .circle {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: #444;
      margin: auto;
    }

    .active .circle {
      background: #C3A768;
    }

    /* ===== 表單 ===== */
    .form-step {
      display: none;
    }

    .form-step.active {
      display: block;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: none;
      background: #1a3554;
      color: #fff;
    }

    /* ===== 圖片預覽 ===== */
    .preview {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .preview img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <div id="header"></div>

  <!-- HERO -->
  <section class="hero-assess">
    <h1>免費評估</h1>
    <p class="text-gold">90%案例可重建，立即了解你的狀況</p>
  </section>


  <section class="contents">

    <!-- 進度 -->
    <div class="progress">
      <div class="step active">
        <div class="circle"></div>
        <p>Step 1</p>
      </div>
      <div class="step">
        <div class="circle"></div>
        <p>Step 2</p>
      </div>
      <div class="step">
        <div class="circle"></div>
        <p>Step 3</p>
      </div>
    </div>

    <form id="form">

      <!-- Step 1 -->
      <div class="form-step active">
        <input name="name" placeholder="姓名">
        <input name="age" placeholder="年齡">
        <button type="button" class="btn next">下一步</button>
      </div>

      <!-- Step 2 -->
      <div class="form-step">
        <select name="symptom">
          <option>選擇症狀</option>
          <option>發炎</option>
          <option>掉落</option>
          <option>疼痛</option>
        </select>

        <input type="file" id="upload" multiple>

        <div class="preview"></div>

        <button type="button" class="btn next">下一步</button>
      </div>

      <!-- Step 3 -->
      <div class="form-step">
        <input name="contact" placeholder="聯絡方式（電話或LINE）">

        <div class="cta">
          <button class="btn btn-red text-white">提交評估</button>
          <a href="https://line.me/R/ti/p/@205rzchp" class="btn btn-green">LINE 諮詢</a>
        </div>
      </div>

    </form>

  </section>
  <!-- 浮動CTA -->
  <div id="floating-cta"></div>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <script>
    // 🔥 初始化
    emailjs.init("_-Y2LMERWucebZccJ");

    /* ===== Step 控制 ===== */
    const steps = document.querySelectorAll('.form-step');
    const progress = document.querySelectorAll('.step');
    let current = 0;

    document.querySelectorAll('.next').forEach(btn => {
      btn.addEventListener('click', () => {
        if (current < steps.length - 1) {
          steps[current].classList.remove('active');
          progress[current].classList.remove('active');

          current++;

          steps[current].classList.add('active');
          progress[current].classList.add('active');
        }
      });
    });

    /* ===== 圖片預覽 ===== */
    document.getElementById('upload').addEventListener('change', function () {
      const preview = document.querySelector('.preview');
      preview.innerHTML = '';

      [...this.files].forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = document.createElement('img');
          img.src = e.target.result;
          preview.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
    });

    /* ===== 圖片壓縮 ===== */
    async function compressImageSmart(file, maxSize = 50000) {
      let quality = 0.7;
      let base64 = await compress(file, quality);

      // 🔥 不斷壓縮直到符合大小
      while (base64.length > maxSize && quality > 0.1) {
        quality -= 0.1;
        base64 = await compress(file, quality);
      }

      return base64;
    }

    function compress(file, quality) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = e => img.src = e.target.result;
        reader.onerror = reject;

        img.onload = () => {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");

          const maxWidth = 800;
          let width = img.width;
          let height = img.height;

          if (width > maxWidth) {
            height *= maxWidth / width;
            width = maxWidth;
          }

          canvas.width = width;
          canvas.height = height;

          ctx.drawImage(img, 0, 0, width, height);

          resolve(canvas.toDataURL("image/jpeg", quality));
        };

        reader.readAsDataURL(file);
      });
    }

    /* ===== 🔥 表單送出（EmailJS版本） ===== */
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const form = document.getElementById('form');
      const formData = new FormData(form);

      const name = formData.get('name');
      const age = formData.get('age');
      const symptom = formData.get('symptom');
      const contact = formData.get('contact');

      // 驗證
      if (!name || !contact) {
        alert("請填寫姓名與聯絡方式");
        return;
      }


      const files = document.getElementById('upload').files;
      let images = [];
      let imageHTML = "";

      if (files.length > 2) {
        alert("最多上傳2張圖片");
        return;
      }

      for (let file of files) {
        const compressed = await compressImageSmart(file);

        // 🔥 最後防呆（真的壓不下才擋）
        if (compressed.length > 50000) {
          alert("圖片仍過大，請換一張圖片");
          return;
        }

        imageHTML += `<img src="${compressed}" style="max-width:300px;"><br/>`;
      }

      console.log({ name, age, symptom, contact, images });

      // 發送
      emailjs.send(
        "service_ak1hqal",
        "template_t1pqdsi",
        {
          name,
          age,
          symptom,
          contact,
          images: imageHTML
        },
        "_-Y2LMERWucebZccJ"
      )
        .then(() => {
          alert("✅ 已送出，專人將與您聯繫");

          setTimeout(() => {
            window.location.href = "./assessment/success.html";
          }, 1000);
        })
        .catch((err) => {
          console.error("錯誤👇", err);
          alert("❌ 發送失敗：" + JSON.stringify(err));
        });

    });

    // 🔥 Base64轉換
    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

  </script>

</body>

</html>
