<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="植牙失敗、發炎、掉落？專業醫師救援，立即免費評估">
  <link rel="icon" href="data:image/svg+xml,
        <svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22>
        <text y=%22.9em%22 font-size=%2290%22>🦷</text>
        </svg>">
  <title>案例中心 | SOS.dental</title>
  <base id="baseHref">
  <link rel="stylesheet" href="../css/style.css">
  <script defer src="../js/main.js"></script>

  <style>
    /* ===== HERO ===== */
    .hero-cases {
      padding: 120px 20px;
      text-align: center;

      background:
        linear-gradient(rgba(12, 30, 51, .85), rgba(12, 30, 51, .95)),
        url('../images/hero-bg-cases.jpg') center/cover;
    }

    /* ===== 篩選 ===== */
    .filters {
      text-align: center;
      margin-top: 20px;
    }

    .filter-btn {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      cursor: pointer;
    }

    .filter-btn.active {
      background: linear-gradient(90deg, #C3A768, #E5D2A3);
      color: #000;
    }

    /* ===== 案例 ===== */
    .cases {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      margin-top: 40px;
      cursor: ew-resize;
    }

    /* ===== Slider ===== */
    .slider {
      position: relative;
      width: 100%;
      height: 260px;
      overflow: hidden;
      border-radius: 12px;
    }

    .slider img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .after {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 50%;
      overflow: hidden;
      z-index: 2;
    }

    .after img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .handle {
      position: absolute;
      top: 0;
      left: 50%;
      width: 30px;
      /* 可拖區 */
      height: 100%;
      transform: translateX(-50%);
      cursor: ew-resize;
      z-index: 3;
    }

    /* 👉 中間那條金色線 */
    .handle::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 3px;
      height: 100%;
      background: linear-gradient(#C3A768, #E5D2A3);
      transform: translateX(-50%);
      box-shadow: 0 0 8px rgba(195, 167, 104, 0.8);
    }

    /* 👉 中間圓形（高級感） */
    .handle::after {
      content: "⇆";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #C3A768;
      color: #000;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    /* 標題 */
    .case-title {
      margin-top: 10px;
      color: #C3A768;
    }

    .case-desc {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
    }
  </style>

</head>

<body>

  <div id="header"></div>

  <!-- HERO -->
  <section class="hero-cases">
    <h1>成功案例</h1>
    <p>從失敗到重建的真實故事</p>

    <a href="./assessment/" class="btn btn-red">免費評估</a>
    <a href="https://line.me/R/ti/p/@205rzchp" class="btn btn-green">LINE 諮詢</a>
  </section>

  <!-- 篩選 -->
  <section class="contents">

    <div class="filters">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="full">全口</button>
      <button class="filter-btn" data-filter="single">單顎</button>
      <button class="filter-btn" data-filter="disaster">災難案例</button>
    </div>

    <!-- 案例 -->
    <div class="cases">

      <!-- CASE -->
      <div class="case" data-category="disaster">
        <div class="slider">
          <img src="../images/Before.jpg">
          <div class="after">
            <img src="../images/After.jpg">
          </div>
          <div class="handle"></div>
        </div>
        <p class="case-title">災難案例 → 完整重建</p>
        <p class="case-desc">原本失敗植牙 → 完整恢復咬合功能</p>

        <a href="./assessment/" class="btn btn-gold">我也想評估</a>
      </div>

    </div>

    <!-- CTA -->
    <section class="cta">
      <h2>你的案例也可以成功</h2>
      <a href="./assessment/" class="btn btn-red">立即評估</a>
    </section>

  </section>


  <!-- 浮動CTA -->
  <div id="floating-cta"></div>

  <script>
    document.querySelectorAll('.slider').forEach(slider => {

      const handle = slider.querySelector('.handle');
      const after = slider.querySelector('.after');

      let isDown = false;

      const move = (x) => {
        const rect = slider.getBoundingClientRect();
        let pos = x - rect.left;

        pos = Math.max(0, Math.min(pos, rect.width));

        after.style.width = pos + "px";
        handle.style.left = pos + "px";
      };

      // 初始
      after.style.width = "50%";
      handle.style.left = "50%";

      /* ===== 滑鼠 ===== */
      slider.addEventListener('mousedown', () => isDown = true);
      window.addEventListener('mouseup', () => isDown = false);

      window.addEventListener('mousemove', e => {
        if (isDown) move(e.clientX);
      });

      /* ===== 手機 ===== */
      slider.addEventListener('touchstart', () => isDown = true);
      slider.addEventListener('touchend', () => isDown = false);

      slider.addEventListener('touchmove', e => {
        move(e.touches[0].clientX);
      });

    });
  </script>

</body>

</html>
