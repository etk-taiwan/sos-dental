<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案例中心</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Noto Serif TC', serif;
  background:#F4F4F4;
}

.section { padding:80px 20px; }
.container { max-width:1200px; margin:auto; }

h1,h2 { font-family:'Cinzel', serif; }

/* HERO */
.hero {
  background:#0C1E33;
  color:#fff;
  text-align:center;
  padding:100px 20px;
}

/* 篩選 */
.filters {
  text-align:center;
  margin-bottom:30px;
}

.filter-btn {
  padding:10px 20px;
  margin:5px;
  border:none;
  cursor:pointer;
  border-radius:6px;
  background:#ddd;
}

.filter-btn.active {
  background:#C3A768;
  color:#000;
}

/* 案例卡 */
.cases {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
}

/* Slider */
.slider {
  position:relative;
  width:100%;
  height:250px;
  overflow:hidden;
  border-radius:10px;
}

.slider img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.after {
  width:50%;
  overflow:hidden;
}

.handle {
  position:absolute;
  top:0;
  left:50%;
  width:3px;
  height:100%;
  background:#C3A768;
  cursor:ew-resize;
}

/* CTA */
.cta {
  background:#0C1E33;
  color:#fff;
  text-align:center;
}

.btn {
  padding:12px 24px;
  border-radius:6px;
  display:inline-block;
  margin:5px;
}

.btn-green { background:#00c853; color:#fff; }
.btn-red { background:#e53935; color:#fff; }

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>成功案例</h1>
  <p>從失敗到重生</p>
</section>

<!-- 篩選 -->
<section class="section container">

  <div class="filters">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="full">全口</button>
    <button class="filter-btn" data-filter="single">單顎</button>
    <button class="filter-btn" data-filter="disaster">災難案例</button>
  </div>

  <div class="cases">

    <!-- CASE 1 -->
    <div class="case" data-category="full">
      <div class="slider">
        <img src="https://via.placeholder.com/600x300?text=Before">
        <div class="after">
          <img src="https://via.placeholder.com/600x300?text=After">
        </div>
        <div class="handle"></div>
      </div>
      <p>全口重建案例</p>
    </div>

    <!-- CASE 2 -->
    <div class="case" data-category="single">
      <div class="slider">
        <img src="https://via.placeholder.com/600x300?text=Before">
        <div class="after">
          <img src="https://via.placeholder.com/600x300?text=After">
        </div>
        <div class="handle"></div>
      </div>
      <p>單顎修復案例</p>
    </div>

    <!-- CASE 3 -->
    <div class="case" data-category="disaster">
      <div class="slider">
        <img src="https://via.placeholder.com/600x300?text=Before">
        <div class="after">
          <img src="https://via.placeholder.com/600x300?text=After">
        </div>
        <div class="handle"></div>
      </div>
      <p>災難重建案例</p>
    </div>

  </div>

</section>

<!-- CTA -->
<section class="section cta">
  <h2>你的案例，也能成功重建</h2>

  <a class="btn btn-green">LINE 諮詢</a>
  <a class="btn btn-red">免費評估</a>
</section>

<script>

/* 篩選 */
const buttons = document.querySelectorAll('.filter-btn');
const cases = document.querySelectorAll('.case');

buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.active').classList.remove('active');
    btn.classList.add('active');

    const filter = btn.dataset.filter;

    cases.forEach(c => {
      if(filter === 'all' || c.dataset.category === filter){
        c.style.display = 'block';
      } else {
        c.style.display = 'none';
      }
    });
  });
});


/* Slider */
document.querySelectorAll('.slider').forEach(slider => {
  const handle = slider.querySelector('.handle');
  const after = slider.querySelector('.after');

  let isDown = false;

  handle.addEventListener('mousedown', () => isDown = true);
  window.addEventListener('mouseup', () => isDown = false);

  window.addEventListener('mousemove', e => {
    if(!isDown) return;

    let rect = slider.getBoundingClientRect();
    let x = e.clientX - rect.left;

    x = Math.max(0, Math.min(x, rect.width));

    after.style.width = x + "px";
    handle.style.left = x + "px";
  });
});

</script>

<div id="header"></div>
</body>
</html>
