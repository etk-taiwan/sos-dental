<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>植牙失敗救援 | SOS.dental</title>
<base id="baseHref">
<link rel="stylesheet" href="../css/style.css">
<script defer src="../js/main.js"></script>

<style>

/* ===== HERO ===== */
.hero-rescue{
  padding:120px 20px;
  text-align:center;

  background:
    linear-gradient(rgba(12,30,51,.85),rgba(12,30,51,.95)),
    url('https://images.unsplash.com/photo-1588776814546-ec7e6b0d7b03?q=80&w=1920') center/cover;
}

.hero-rescue h1{
  font-size:42px;
}

/* ===== 卡片 ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(195,167,104,0.2);
  padding:25px;
  border-radius:12px;
  text-align:center;
}

/* ===== 流程 ===== */
.flow{
  display:flex;
  justify-content:space-between;
  margin-top:40px;
  text-align:center;
}

.flow div{flex:1;}

.flow span{
  color:#C3A768;
  font-weight:bold;
}

/* ===== 影片 ===== */
.video{
  text-align:center;
  margin-top:40px;
}

.video iframe{
  width:100%;
  max-width:800px;
  height:400px;
}

/* ===== CTA ===== */
.cta{
  text-align:center;
  margin-top:60px;
}

</style>

</head>

<body>

<!-- 共用 Header -->
<div id="header"></div>

<!-- HERO -->
<section class="hero-rescue">
  <h1>植牙失敗救援</h1>
  <p>找出原因，才能真正解決</p>

  <!-- 🔥 主CTA -->
  <a href="/assessment/" class="btn btn-red">免費評估</a>
  <a href="https://line.me/R/ti/p/@你的ID" class="btn btn-green">LINE 諮詢</a>
</section>

<section style="text-align:center;padding:20px;color:#C3A768;">
✔ 高風險植牙專門處理　✔ 重建成功率高　✔ 數位導引精準
</section>

<!-- 失敗類型 -->
<section class="container">
<h2>常見失敗類型</h2>

<div class="grid">
  <div class="card">🔥 持續發炎</div>

  <div class="card">🦷 無法咬合</div>

</div>

</div>
</section>

<!-- 解決流程 -->
<section class="container">
<h2>救援流程</h2>

<div class="flow">
  <div>診斷</div>
  <div><span>→</span></div>
  <div>移除問題植體</div>
  <div><span>→</span></div>

  <div>重新植牙</div>
</div>
</section>

<!-- 案例影片 -->
<section class="container video">
<h2>真實案例</h2>

<p style="color:#C3A768;">災難案例 → 完整重建</p>

<iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>

<!-- CTA -->
