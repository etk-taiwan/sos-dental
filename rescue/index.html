<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="植牙失敗、發炎、掉落？專業醫師救援，立即免費評估">
  <title>植牙失敗救援 | SOS.dental</title>
  <base id="baseHref">
  <link rel="stylesheet" href="../css/style.css">
  <script defer src="../js/main.js"></script>

</head>

<body>

  <!-- 共用 Header -->
  <div id="header"></div>

  <!-- HERO -->
  <section class="hero-rescue">
    <h1>植牙失敗救援</h1>
    <p>找出原因，才能真正解決</p>

    <!-- 🔥 主CTA -->
    <a href="/assessment/" class="btn btn-red">免費評估</a>
    <a href="https://line.me/R/ti/p/@你的ID" class="btn btn-green">LINE 諮詢</a>
  </section>

  <section class="contents">
    <!-- 信任條 -->
    <section style="text-align:center;padding:20px;color:#C3A768;">
      ✔ 高風險植牙專門處理　✔ 重建成功率高　✔ 數位導引精準
    </section>

    <!-- 失敗類型 -->
    <section class="container">
      <h2>常見失敗類型</h2>

      <div class="grid">
        <div class="card">🔥 持續發炎</div>
        <div class="card">😢 植體鬆動</div>
        <div class="card">🦷 無法咬合</div>
        <div class="card">⚠️ 骨質流失</div>
      </div>
    </section>

    <!-- 原因解析 -->
    <section class="container">
      <h2>失敗原因解析</h2>

      <div class="grid">
        <div class="card">位置錯誤</div>
        <div class="card">骨量不足</div>
        <div class="card">感染控制差</div>
      </div>
    </section>

    <!-- 解決流程 -->
    <section class="container">
      <h2>救援流程</h2>

      <div class="flow">
        <div>診斷</div>
        <div><span>→</span></div>
        <div>移除問題植體</div>
        <div><span>→</span></div>
        <div>重建骨條件</div>
        <div><span>→</span></div>
        <div>重新植牙</div>
      </div>
    </section>

    <!-- 案例影片 -->
    <section class="container video">
      <h2>真實案例</h2>

      <p style="color:#C3A768;">災難案例 → 完整重建</p>

      <iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
    </section>

    <!-- CTA -->
    <section class="cta">
      <h2>你的狀況也可以改善</h2>

      <a href="/assessment/" class="btn btn-red">立即評估</a>
      <a href="https://line.me/R/ti/p/@你的ID" class="btn btn-green">LINE 諮詢</a>
    </section>
  </section>
  <!-- 浮動CTA -->
  <div id="floating-cta"></div>

</body>

</html>
