<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>植牙知識 | SOS.dental</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">

<style>

/* ===== HERO ===== */
.hero-edu {
  position:relative;
  padding:120px 20px;
  text-align:center;
  color:#fff;

  background:
    linear-gradient(rgba(12,30,51,.85), rgba(12,30,51,.95)),
    url('https://images.unsplash.com/photo-1588776814546-ec7e6b0d7b03?q=80&w=1920') center/cover;
}

.hero-edu::before {
  content:"";
  position:absolute;
  top:-100px;
  left:50%;
  transform:translateX(-50%);
  width:800px;
  height:400px;
  background: radial-gradient(circle, rgba(195,167,104,0.25), transparent 70%);
}

/* ===== 分類 ===== */
.categories {
  text-align:center;
  margin-bottom:40px;
}

.categories button {
  margin:5px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  color:#fff;
  cursor:pointer;
}

.categories .active {
  background:linear-gradient(90deg,#C3A768,#E5D2A3);
  color:#000;
}

/* ===== 文章卡 ===== */
.articles {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

.article {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(195,167,104,0.2);
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
}

.article:hover {
  transform:translateY(-5px);
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.article img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.article-content {
  padding:20px;
}

.article-content h3 {
  font-size:18px;
  margin-bottom:10px;
}

.article-content p {
  font-size:14px;
  color:rgba(255,255,255,0.7);
}

/* CTA */
.cta {
  text-align:center;
  margin-top:60px;
}

</style>
</head>

<body>

<!-- Header -->
<header>
<nav>
<div>🦷 SOS.dental</div>
<div>
<a href="/">首頁</a>
<a href="/rescue/">救援</a>
<a href="/cases/">案例</a>
<a href="/assessment/">評估</a>
</div>
</nav>
</header>

<!-- HERO -->
<section class="hero-edu">
  <h1>植牙知識中心</h1>
  <p>專業解析，讓你做出正確選擇</p>
</section>

<!-- 分類 -->
<section class="container">

<div class="categories">
  <button class="active" data-cat="all">全部</button>
  <button data-cat="failure">失敗原因</button>
  <button data-cat="treatment">治療方式</button>
  <button data-cat="risk">風險解析</button>
</div>

<!-- 文章列表 -->
<div class="articles">

  <div class="article" data-cat="failure">
    <img src="https://via.placeholder.com/400x200">
    <div class="article-content">
      <h3>植牙為什麼會失敗？</h3>
      <p>常見失敗原因與預防方式解析</p>
    </div>
  </div>

  <div class="article" data-cat="treatment">
    <img src="https://via.placeholder.com/400x200">
    <div class="article-content">
      <h3>植牙重做流程完整解析</h3>
      <p>從拆除到重建的完整步驟</p>
    </div>
  </div>

  <div class="article" data-cat="risk">
    <img src="https://via.placeholder.com/400x200">
    <div class="article-content">
      <h3>骨質不足可以植牙嗎？</h3>
      <p>骨增量與補骨技術說明</p>
    </div>
  </div>

</div>

<!-- CTA -->
<div class="cta">
  <a href="/assessment/" class="btn btn-gold">免費評估</a>
  <a href="#" class="btn btn-green">LINE 諮詢</a>
</div>

</section>

<script>

/* 分類篩選 */
const btns = document.querySelectorAll('.categories button');
const articles = document.querySelectorAll('.article');

btns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelector('.categories .active').classList.remove('active');
    btn.classList.add('active');

    const cat = btn.dataset.cat;

    articles.forEach(a=>{
      if(cat === 'all' || a.dataset.cat === cat){
        a.style.display='block';
      }else{
        a.style.display='none';
      }
    });
  });
});

</script>

<div id="header"></div>
</body>
</html>
